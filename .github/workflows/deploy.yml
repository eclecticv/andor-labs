name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # Deploy only once the CLOUDFLARE_API_TOKEN secret exists — so the workflow
      # never red-X's before it's configured. Add the secret to activate CD.
      - name: Deploy to Cloudflare Pages
        if: ${{ env.CF_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CF_API_TOKEN }}
          accountId: 63956fb1f50aec70801897b5de548e8d
          command: pages deploy dist --project-name=andor-labs --branch=main
